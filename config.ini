[General]
theme = dark
language = ru
auto_save = true
auto_save_interval = 300

[Editor]
font_family = Consolas
font_size = 12
tab_size = 4
line_numbers = true
word_wrap = false
auto_indent = true

[Interface]
toolbar_visible = true
statusbar_visible = true
menubar_visible = true
window_width = 1200
window_height = 800

[Files]
default_encoding = utf-8
remember_open_files = true
max_recent_files = 10

